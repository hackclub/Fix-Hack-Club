services:
  - type: web
    name: fix-hack-club
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: HACKCLUB_CLIENT_ID
        sync: false
      - key: HACKCLUB_CLIENT_SECRET
        sync: false
      - key: ADMIN_HACK_CLUB_IDS
        sync: false
      - key: HACKATIME_CLIENT_ID
        sync: false
      - key: HACKATIME_CLIENT_SECRET
        sync: false
      - key: HACKATIME_BYPASS_KEYS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
