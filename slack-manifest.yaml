display_information:
  name: Pullquests Bot
  description: AI assistant for FixHC Pullquests — answers questions and gathers details before a human steps in.
  background_color: "#f0ab00"

features:
  bot_user:
    display_name: Pullquests Bot
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - im:history
      - im:write
      - channels:history

settings:
  event_subscriptions:
    # Replace with your actual Render URL before uploading.
    request_url: https://YOUR_APP.onrender.com/api/slack/events
    bot_events:
      - app_mention
      - message.im
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
